<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AstroVision V2.4</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #00f2ff; font-family: monospace; overflow: hidden; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #debug { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; font-size: 12px; background: rgba(0,0,0,0.5); }
        .ui { position: absolute; inset: 0; z-index: 10; pointer-events: none; border: 1px solid rgba(0,242,255,0.2); }
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 20; pointer-events: auto; gap: 20px; }
        input[type=range] { width: 80%; accent-color: #00f2ff; }
        button { background: rgba(0,0,0,0.6); border: 1px solid #00f2ff; color: #00f2ff; padding: 15px; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="debug">SİSTEM BAŞLATILIYOR...</div>
    <video id="v" autoplay playsinline muted></video>
    <div class="ui"><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;border:1px solid #00f2ff;border-radius:50%;"></div></div>
    <div class="controls">
        <input type="range" min="1" max="15" step="0.1" value="1" oninput="document.getElementById('v').style.transform='scale('+this.value+')'">
        <button onclick="location.reload()"><i data-lucide="refresh-cw"></i></button>
    </div>
    <script>
        lucide.createIcons();
        async function start() {
            const d = document.getElementById('debug');
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } } });
                document.getElementById('v').srcObject = s;
                d.innerText = "SİSTEM BAŞARILI: KAMERA AKTİF";
                setTimeout(() => d.style.display = 'none', 3000);
            } catch (e) {
                d.innerText = "HATA: " + e.message + " - LÜTFEN İZİNLERİ KONTROL EDİN";
                // Arka kamera bulunamazsa herhangi bir kamerayı dene
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = s;
            }
        }
        window.onload = start;
    </script>
</body>
</html>
