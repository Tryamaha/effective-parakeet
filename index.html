<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
    <title>AstroVision V11 - Sonic Voyager</title>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --neon: #00f2ff; --glass: rgba(0, 10, 20, 0.85); --purple: #7000ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.7; }
        #freq-canvas { position: absolute; bottom: 150px; left: 0; width: 100%; height: 150px; z-index: 3; pointer-events: none; }
        
        .ui-layer { position: absolute; z-index: 10; pointer-events: auto; width: 100%; }
        #hud-top { top: env(safe-area-inset-top); padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); display: flex; justify-content: space-between; align-items: flex-start; }
        
        .siri-orb { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 250px; height: 100px; background: radial-gradient(circle, var(--neon), var(--purple), #ff00c8); filter: blur(40px); border-radius: 50%; z-index: 5; opacity: 0.5; animation: pulse 3s infinite; }
        
        #audio-panel { position: absolute; top: 120px; right: 15px; width: 120px; background: var(--glass); padding: 15px; border-radius: 15px; border: 1px solid var(--neon); font-family: monospace; font-size: 10px; color: var(--neon); }
        
        #controls { bottom: calc(env(safe-area-inset-bottom) + 20px); display: flex; justify-content: center; align-items: center; gap: 30px; padding: 20px; }
        .btn { width: 60px; height: 60px; border-radius: 50%; background: var(--glass); border: 1px solid var(--neon); color: white; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #main-btn { width: 85px; height: 85px; border: 6px solid #fff; }

        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.4; } 50% { transform: translateX(-50%) scale(1.3, 0.7); opacity: 0.7; } }
    </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="freq-canvas"></canvas>
<div class="siri-orb"></div>

<div id="hud-top" class="ui-layer">
    <div>
        <div style="font-weight: 900; font-size: 18px; text-shadow: 0 0 10px var(--neon);">SONIC VOYAGER V11</div>
        <div id="status" style="color: var(--neon); font-size: 10px;">AI FREQUENCY SCANNER: ACTIVE</div>
    </div>
    <div style="text-align: right; font-size: 10px; color: var(--neon);">
        LAT: <span id="lat">--</span><br>
        LON: <span id="lon">--</span>
    </div>
</div>

<div id="audio-panel" class="ui-layer">
    FREQUENCY:<br><b id="freq-val">0 Hz</b><br><br>
    PEAK:<br><b id="peak-val">0 dB</b><br><br>
    ZONE:<br><b id="zone-val">IDLE</b>
</div>

<div id="controls" class="ui-layer" style="position: absolute; bottom: 0;">
    <button class="btn" onclick="toggleZoom(-5)"><i data-lucide="zoom-out"></i></button>
    <div id="main-btn" class="btn" onclick="initAudio()">🎙️</div>
    <button class="btn" onclick="toggleZoom(5)"><i data-lucide="zoom-in"></i></button>
</div>

<script>
    lucide.createIcons();
    const video = document.getElementById('video');
    const fCanvas = document.getElementById('freq-canvas');
    const fCtx = fCanvas.getContext('2d');
    let audioCtx, analyser, dataArray, zoom = 1.0;

    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { exact: "environment" }, width: { ideal: 3840 } },
            audio: true
        });
        video.srcObject = stream;
        
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('lat').innerText = p.coords.latitude.toFixed(4);
            document.getElementById('lon').innerText = p.coords.longitude.toFixed(4);
        });

        render();
    }

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = video.srcObject;
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            document.getElementById('status').innerText = "AUDIO ANALYSIS: RUNNING";
        }
    }

    function render() {
        // Frequency Visualizer
        if (analyser) {
            fCanvas.width = window.innerWidth;
            fCanvas.height = 150;
            analyser.getByteFrequencyData(dataArray);
            
            fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);
            fCtx.beginPath();
            fCtx.strokeStyle = '#00f2ff';
            fCtx.lineWidth = 2;
            
            let sliceWidth = fCanvas.width / dataArray.length;
            let x = 0;
            let maxVal = 0;
            let maxIdx = 0;

            for (let i = 0; i < dataArray.length; i++) {
                let v = dataArray[i] / 128.0;
                let y = v * fCanvas.height / 2;
                
                if (dataArray[i] > maxVal) {
                    maxVal = dataArray[i];
                    maxIdx = i;
                }

                if (i === 0) fCtx.moveTo(x, fCanvas.height - y);
                else fCtx.lineTo(x, fCanvas.height - y);
                x += sliceWidth;
            }
            fCtx.stroke();
            
            const hz = Math.round(maxIdx * audioCtx.sampleRate / analyser.fftSize);
            document.getElementById('freq-val').innerText = hz + " Hz";
            document.getElementById('peak-val').innerText = maxVal + " dB";
            
            // Frequency Zoning AI
            let zone = "NORMAL";
            if (hz > 15000) zone = "ULTRASONIC";
            else if (hz < 50) zone = "INFRASONIC";
            else if (hz > 2000 && hz < 4000) zone = "VOICE";
            document.getElementById('zone-val').innerText = zone;
        }

        requestAnimationFrame(render);
    }

    function toggleZoom(amt) {
        zoom = Math.max(1, Math.min(50, zoom + amt));
        video.style.transform = `scale(${zoom})`;
    }

    window.onload = init;
</script>
</body>
</html>
