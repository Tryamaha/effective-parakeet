<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
    <title>AstroVision V10 - Celestial Entity</title>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --neon: #00f2ff; --glass: rgba(0, 10, 20, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        
        /* layers */
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #ar-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        /* UI Elements */
        .ui-overlay { position: absolute; z-index: 10; pointer-events: auto; }
        #hud-top { top: env(safe-area-inset-top); left: 0; right: 0; padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); text-align: center; }
        #target-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border: 1px dashed var(--neon); border-radius: 50%; opacity: 0.5; animation: rotate 20s linear infinite; }
        
        /* Siri Orb & Controls */
        .siri-nebula { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 200px; height: 80px; background: radial-gradient(circle, #00f2ff, #7000ff, #ff00c8); filter: blur(35px); border-radius: 50%; z-index: 5; opacity: 0.4; animation: pulse 4s infinite; }
        #controls { bottom: calc(env(safe-area-inset-bottom) + 20px); left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 25px; background: var(--glass); backdrop-filter: blur(25px); padding: 15px 30px; border-radius: 50px; border: 1px solid rgba(0,242,255,0.3); }
        
        .btn-action { width: 55px; height: 55px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid var(--neon); color: white; display: flex; align-items: center; justify-content: center; }
        #shutter { width: 75px; height: 75px; border: 5px solid #fff; background: rgba(255,255,255,0.2); }

        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1.0); opacity: 0.3; } 50% { transform: translateX(-50%) scale(1.4, 0.8); opacity: 0.6; } }
        
        #telemetry { position: absolute; top: 100px; left: 15px; font-size: 10px; color: var(--neon); line-height: 1.5; font-family: monospace; }
    </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="ar-canvas"></canvas>
<div class="siri-nebula"></div>

<div id="hud-top" class="ui-overlay">
    <div style="font-weight: 900; font-size: 20px; text-shadow: 0 0 10px var(--neon);">CELESTIAL ENTITY V10</div>
    <div id="target-name" style="color: var(--neon); font-size: 11px; margin-top: 5px;">HEDEF ARANIYOR...</div>
</div>

<div id="telemetry" class="ui-overlay">
    AZIMUTH: <span id="val-az">--</span><br>
    ALTITUDE: <span id="val-alt">--</span><br>
    OBJECT: <span id="val-obj">NONE</span><br>
    GPS: <span id="val-gps">LOCKED</span>
</div>

<div id="target-box"></div>

<div id="controls" class="ui-overlay">
    <button class="btn-action" onclick="adjustZoom(-5)"><i data-lucide="minus"></i></button>
    <div id="shutter" class="btn-action" onclick="takeSnapshot()"></div>
    <button class="btn-action" onclick="adjustZoom(5)"><i data-lucide="plus"></i></button>
</div>

<script>
    lucide.createIcons();
    const video = document.getElementById('video');
    const canvas = document.getElementById('ar-canvas');
    const ctx = canvas.getContext('2d');
    let zoom = 1.0, lat, lon, heading = 0;

    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { exact: "environment" }, width: { ideal: 3840 } }
        });
        video.srcObject = stream;
        
        navigator.geolocation.getCurrentPosition(p => {
            lat = p.coords.latitude;
            lon = p.coords.longitude;
        });

        window.addEventListener('deviceorientation', e => {
            heading = e.webkitCompassHeading || 360 - e.alpha;
            updateCelestialMath();
        });

        render();
    }

    function updateCelestialMath() {
        if(!lat || !lon) return;
        const now = new Date();
        const observer = new Astronomy.Observer(lat, lon, 0);
        
        // Ay ve Gezegenleri Tara
        const bodies = ['Moon', 'Venus', 'Mars', 'Jupiter', 'Saturn'];
        bodies.forEach(body => {
            const equ = Astronomy.Equator(body, now, observer, true, true);
            const hor = Astronomy.Horizon(now, observer, equ.ra, equ.dec, 'normal');
            
            if(Math.abs(hor.azimuth - heading) < 10 && hor.altitude > 0) {
                document.getElementById('val-obj').innerText = body.toUpperCase();
                document.getElementById('target-name').innerText = body.toUpperCase() + " TESPİT EDİLDİ";
            }
        });
        
        document.getElementById('val-az').innerText = Math.round(heading) + "°";
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const w = canvas.width / zoom;
        const h = canvas.height / zoom;
        ctx.drawImage(video, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h, 0, 0, canvas.width, canvas.height);
        
        requestAnimationFrame(render);
    }

    function adjustZoom(amt) {
        zoom = Math.max(1, Math.min(100, zoom + amt));
    }

    function takeSnapshot() {
        const link = document.createElement('a');
        link.download = `AstroV10_${Date.now()}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    window.onload = init;
</script>
</body>
</html>
