<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
    <title>AstroVision V12 - Astro-Sonic Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --neon: #00f2ff; --purple: #7000ff; --glass: rgba(0, 10, 20, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        
        /* layers */
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.8; transition: transform 0.2s; }
        #overlay-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        
        /* UI HUD */
        .ui-layer { position: absolute; z-index: 10; pointer-events: auto; width: 100%; }
        #top-hud { top: env(safe-area-inset-top); padding: 15px; display: flex; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        
        /* Siri Orb */
        .siri-orb { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 220px; height: 90px; background: radial-gradient(circle, var(--neon), var(--purple), #ff00c8); filter: blur(35px); border-radius: 50%; z-index: 3; opacity: 0.4; animation: pulse 4s infinite; }
        
        /* AI Panel */
        #ai-panel { position: absolute; top: 100px; right: 15px; width: 160px; background: var(--glass); padding: 15px; border-radius: 15px; border: 1px solid var(--neon); font-family: monospace; font-size: 10px; }
        .ai-comment { color: yellow; margin-top: 8px; font-style: italic; border-top: 1px solid rgba(0,242,255,0.2); padding-top: 5px; }

        /* Controls */
        #controls { position: absolute; bottom: calc(env(safe-area-inset-bottom) + 20px); width: 100%; display: flex; justify-content: center; align-items: center; gap: 25px; z-index: 20; }
        .btn { width: 55px; height: 55px; border-radius: 50%; background: var(--glass); border: 1px solid var(--neon); color: white; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #shutter { width: 80px; height: 80px; border: 5px solid #fff; }

        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.4; } 50% { transform: translateX(-50%) scale(1.4, 0.8); opacity: 0.6; } }
    </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="overlay-canvas"></canvas>
<div class="siri-orb"></div>

<div id="top-hud" class="ui-layer">
    <div>
        <div style="font-weight: 900; font-size: 16px; text-shadow: 0 0 10px var(--neon);">ASTRO-SONIC V12</div>
        <div id="target-id" style="color: var(--neon); font-size: 10px;">HEDEF: ARANIYOR...</div>
    </div>
    <div style="text-align: right; font-size: 10px; color: var(--neon);">
        AZ: <span id="az-val">--</span>° | ALT: <span id="alt-val">--</span>°<br>
        GPS: <span id="gps-stat">LOCKED</span>
    </div>
</div>

<div id="ai-panel" class="ui-layer">
    <b>SCANNER DATA</b><br>
    FREQ: <span id="f-val">0 Hz</span><br>
    ZONE: <span id="z-val">IDLE</span><br>
    <div class="ai-comment" id="ai-msg">AI: Ortam analizi bekleniyor...</div>
</div>

<div id="controls" class="ui-layer">
    <button class="btn" onclick="adjustZoom(-5)"><i data-lucide="zoom-out"></i></button>
    <div id="shutter" class="btn" onclick="toggleAudio()">🎙️</div>
    <button class="btn" onclick="adjustZoom(5)"><i data-lucide="zoom-in"></i></button>
</div>

<script>
    lucide.createIcons();
    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay-canvas');
    const ctx = canvas.getContext('2d');
    let zoom = 1.0, lat, lon, heading = 0, audioCtx, analyser, dataArray;

    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { exact: "environment" }, width: { ideal: 3840 } },
            audio: true
        });
        video.srcObject = stream;
        
        navigator.geolocation.getCurrentPosition(p => {
            lat = p.coords.latitude; lon = p.coords.longitude;
            document.getElementById('gps-stat').innerText = "LAT: " + lat.toFixed(2);
        });

        window.addEventListener('deviceorientation', e => {
            heading = e.webkitCompassHeading || 360 - e.alpha;
            document.getElementById('az-val').innerText = Math.round(heading);
            updateCelestialMath();
        });

        render();
    }

    async function toggleAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(video.srcObject);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 1024;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            document.getElementById('ai-msg').innerText = "AI: Dinleme aktif. Frekanslar taranıyor.";
        }
    }

    function updateCelestialMath() {
        if(!lat || !lon) return;
        const now = new Date();
        const obs = new Astronomy.Observer(lat, lon, 0);
        const bodies = ['Moon', 'Venus', 'Mars', 'Jupiter', 'Saturn'];
        
        bodies.forEach(body => {
            const equ = Astronomy.Equator(body, now, obs, true, true);
            const hor = Astronomy.Horizon(now, obs, equ.ra, equ.dec, 'normal');
            if(Math.abs(hor.azimuth - heading) < 15 && hor.altitude > 0) {
                document.getElementById('target-id').innerText = "HEDEF: " + body.toUpperCase();
                document.getElementById('alt-val').innerText = Math.round(hor.altitude);
            }
        });
    }

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0,0, canvas.width, canvas.height);

        // Crosshair
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(canvas.width/2, canvas.height/2, 100, 0, Math.PI*2);
        ctx.moveTo(canvas.width/2-120, canvas.height/2); ctx.lineTo(canvas.width/2+120, canvas.height/2);
        ctx.moveTo(canvas.width/2, canvas.height/2-120); ctx.lineTo(canvas.width/2, canvas.height/2+120);
        ctx.stroke();

        // Audio Visualizer (Waveform on HUD)
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.5)';
            let slice = canvas.width / dataArray.length;
            let x = 0;
            let maxHz = 0, maxDb = 0;

            for(let i=0; i<dataArray.length; i++) {
                let v = dataArray[i] / 128.0;
                let y = v * 50;
                if(i===0) ctx.moveTo(x, canvas.height - 200 - y);
                else ctx.lineTo(x, canvas.height - 200 - y);
                x += slice;
                if(dataArray[i] > maxDb) { maxDb = dataArray[i]; maxHz = i; }
            }
            ctx.stroke();

            const hz = Math.round(maxHz * audioCtx.sampleRate / analyser.fftSize);
            document.getElementById('f-val').innerText = hz + " Hz";
            
            // AI Comment Logic
            if(hz > 15000) {
                document.getElementById('z-val').innerText = "ULTRASONIC";
                document.getElementById('ai-msg').innerText = "AI: İnsan kulağının duyamadığı yüksek frekanslı bir sinyal yakalandı.";
            } else if(hz < 60 && maxDb > 50) {
                document.getElementById('z-val').innerText = "INFRASONIC";
                document.getElementById('ai-msg').innerText = "AI: Derin, düşük frekanslı bir uğultu tespit edildi. Yapısal bir titreşim olabilir.";
            } else {
                document.getElementById('z-val').innerText = "NORMAL";
            }
        }
        requestAnimationFrame(render);
    }

    function adjustZoom(amt) {
        zoom = Math.max(1, Math.min(60, zoom + (amt/5)));
        video.style.transform = `scale(${zoom})`;
    }

    window.onload = init;
</script>
</body>
</html>
