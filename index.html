<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AstroVision Nebula V12</title>

    <!-- Professional Core Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --accent: #00f2ff; --neon-purple: #7000ff; --glass: rgba(0, 12, 24, 0.75); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; height: 100vh; }

        /* Render Layers */
        #video-feed { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transition: filter 0.4s ease; }
        #canvas-overlay { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

        /* Glassmorphism UI Components */
        .hud-ui { position: absolute; z-index: 10; pointer-events: auto; }
        #top-bar { top: env(safe-area-inset-top); left: 0; right: 0; padding: 15px; background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%); display: flex; justify-content: space-between; align-items: flex-start; }
        
        .data-label { font-family: 'Courier New', monospace; font-size: 11px; color: var(--accent); letter-spacing: 1px; text-shadow: 0 0 8px rgba(0,242,255,0.6); line-height: 1.4; }
        
        /* Ultra-Telescope Reticle */
        .reticle-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 8; }
        .outer-ring { width: 180px; height: 180px; border: 1px solid rgba(0,242,255,0.25); border-radius: 50%; animation: pulseRing 4s infinite linear; }
        .inner-cross { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--accent); font-size: 20px; opacity: 0.6; }

        /* Siri-Orb V5 Evolution */
        .nebula-nebula { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 180px; height: 60px; background: radial-gradient(circle, var(--accent), var(--neon-purple), #ff00c8); filter: blur(30px); border-radius: 50%; z-index: 4; opacity: 0.4; animation: siriBreath 6s infinite ease-in-out; }

        /* Professional Control Cluster */
        #bottom-panel { bottom: calc(env(safe-area-inset-bottom) + 20px); left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 18px; background: var(--glass); backdrop-filter: blur(25px); padding: 14px 28px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        
        .action-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: #fff; display: flex; align-items: center; justify-content: center; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 15px var(--accent); }
        #capture-shutter { width: 70px; height: 70px; border: 4px solid #fff; background: rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(255,255,255,0.3); }

        @keyframes siriBreath { 0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.3; } 50% { transform: translateX(-50%) scale(1.3, 0.85); opacity: 0.6; } }
        @keyframes pulseRing { from { transform: rotate(0deg); opacity: 0.2; } to { transform: rotate(360deg); opacity: 0.4; } }

        #error-msg { position: fixed; top: 50%; width: 100%; text-align: center; color: #ff3b30; z-index: 100; font-size: 14px; background: rgba(0,0,0,0.8); display: none; padding: 20px; }
    </style>
</head>
<body>

<div id="error-msg">SİSTEM HATASI: KAMERA VEYA KONUM İZNİ GEREKLİ.</div>

<video id="video-feed" autoplay playsinline muted></video>
<canvas id="canvas-overlay"></canvas>
<div class="nebula-nebula"></div>

<div class="reticle-container">
    <div class="outer-ring"></div>
    <div class="inner-cross">+</div>
</div>

<div id="top-bar" class="hud-ui">
    <div class="data-label">
        STATION: NEBULA V12<br>
        LOC: <span id="loc-data">CALIBRATING...</span><br>
        STATUS: <span id="status-data" style="color: #4cd964;">AI ACTIVE</span>
    </div>
    <div class="data-label" style="text-align: right;">
        MAG: <span id="mag-data">1.0x</span><br>
        AZIMUTH: <span id="az-data">0°</span><br>
        SENSOR: 48MP PRO+
    </div>
</div>

<div id="bottom-panel" class="hud-ui">
    <button class="action-btn" id="mode-night" onclick="cycleMode()"><i data-lucide="eye"></i></button>
    <button class="action-btn" onclick="updateZoom(-5)"><i data-lucide="minus"></i></button>
    <div id="capture-shutter" class="action-btn" onclick="takePhoto()"></div>
    <button class="action-btn" onclick="updateZoom(5)"><i data-lucide="plus"></i></button>
    <button class="action-btn" id="ai-voice" onclick="toggleVoice()"><i data-lucide="mic"></i></button>
</div>

<script>
    lucide.createIcons();
    const video = document.getElementById('video-feed');
    const canvas = document.getElementById('canvas-overlay');
    const ctx = canvas.getContext('2d');
    const err = document.getElementById('error-msg');

    let currentZoom = 1.0;
    let userLat = null, userLon = null;
    let currentHeading = 0;
    let filterIndex = 0;
    const filters = ['none', 'sepia(1) hue-rotate(90deg) brightness(1.5) contrast(1.2)', 'invert(1) hue-rotate(180deg) brightness(1.2)'];

    async function initializeSystem() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: { exact: "environment" }, width: { ideal: 3840 }, height: { ideal: 2160 } }
            });
            video.srcObject = stream;
            
            navigator.geolocation.getCurrentPosition(pos => {
                userLat = pos.coords.latitude;
                userLon = pos.coords.longitude;
                document.getElementById('loc-data').innerText = `${userLat.toFixed(2)}N, ${userLon.toFixed(2)}E`;
            }, () => { err.style.display = 'block'; });

            window.addEventListener('deviceorientation', e => {
                currentHeading = e.webkitCompassHeading || (360 - e.alpha);
                document.getElementById('az-data').innerText = Math.round(currentHeading) + "°";
            });

            loop();
        } catch (e) { err.style.display = 'block'; }
    }

    function loop() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const drawW = canvas.width / currentZoom;
        const drawH = canvas.height / currentZoom;
        const startX = (canvas.width - drawW) / 2;
        const startY = (canvas.height - drawH) / 2;
        
        ctx.drawImage(video, startX, startY, drawW, drawH, 0, 0, canvas.width, canvas.height);
        requestAnimationFrame(loop);
    }

    function updateZoom(step) {
        currentZoom = Math.max(1, Math.min(100, currentZoom + step/10));
        document.getElementById('mag-data').innerText = currentZoom.toFixed(1) + "x";
    }

    function cycleMode() {
        filterIndex = (filterIndex + 1) % filters.length;
        video.style.filter = filters[filterIndex];
        document.getElementById('mode-night').classList.toggle('active', filterIndex !== 0);
    }

    function toggleVoice() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return;
        const rec = new Speech();
        rec.lang = 'tr-TR';
        rec.onresult = (e) => {
            const cmd = e.results[0][0].transcript.toLowerCase();
            if (cmd.includes("yaklaş") || cmd.includes("zoom")) updateZoom(30);
            if (cmd.includes("uzaklaş")) updateZoom(-30);
            if (cmd.includes("çek") || cmd.includes("foto")) takePhoto();
            if (cmd.includes("mod")) cycleMode();
        };
        rec.start();
        document.getElementById('ai-voice').classList.add('active');
        setTimeout(() => document.getElementById('ai-voice').classList.remove('active'), 3000);
    }

    function takePhoto() {
        const link = document.createElement('a');
        link.download = `Nebula_Capture_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    window.onload = initializeSystem;
</script>
</body>
</html>
